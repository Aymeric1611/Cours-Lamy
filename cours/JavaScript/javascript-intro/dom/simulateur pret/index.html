<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de placement</title>
</head>

<body>
    <h1>Simulateur de placement</h1>
    <h1>A = P x (1 + r)^t</h1>
    <form >
        <label for="capitalPlace">Capital placé <span id="afficheCapitalPlace"></span></label> <br>
        <input type="range" id="capitalPlace" min="1000" max="100000" value="10000"> <br>

        <label for="tauxAnnuel">Taux annuel <span id="afficheTauxAnnuel"></span></label> <br>
        <input type="range" id="tauxAnnuel" min="0" max="20" value="3"> <br>

        <label for="dureePlacement">Durée du placement <span id="afficheDuree"></span></label> <br>
        <input type="range" id="dureePlacement" min="1" max="30" value="5"> <br>
    </form>
    <div>
        <p>Capital final à rembourser</p>
        <p id="afficheCapitalFinal"></p>
    </div>
    <div>

    </div>
    <div>
       Vous empruntez 10 000,00 € sur 5 ans à un taux annuel de 3 %. Le capital final à rembourser sera de 11 592,74 €. Le coût des intérêts sera de 1 592,74 €. 
    </div>

    <script src="app.js"></script>
</body>

</html>
