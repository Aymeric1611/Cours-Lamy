<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Card -->
    <div class="card">
        <span class="badge">Nouveau</span>
            <!-- Image -->
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=900&q=80" alt="Ordinateur portable">
        <!-- Contenu -->
        <div class="card-content">
            <h2>Découvrir Flexbox</h2>
            <p>Apprends à organiser facilement tes blocs grâce à Flexbox et crée des mises en page modernes.</p>
        
            <div class="card-actions">
                <a href="#" class="btn btn-blue">Voir plus</a>
                <a href="#" class="btn btn-gray">Favori</a>
            </div>
        </div>
    </div>
</body>
</html>
